<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карась Кликер: Ultra Edition</title>
    <style>
        :root {
            --accent: #00f2ff; --gold: #ffcc00; --bg: #01080f; --glass: rgba(255, 255, 255, 0.1); 
            --danger: #ff4d4d; --common: #ffffff; --rare: #0070dd; --epic: #a335ee; --legendary: #ff8000;
            --event: #ff00ff;
        }
        * { user-select: none; box-sizing: border-box; outline: none; transition: all 0.2s ease-out; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        #ocean { position: fixed; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #0a1f33 0%, #01080f 100%); }
        
        #game-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 12px 30px; border-radius: 50px; font-weight: 900; z-index: 2000; transition: 0.5s; box-shadow: 0 0 20px var(--accent); }
        #game-toast.active { top: 20px; }

        .ui-top { text-align: center; margin-top: 15px; z-index: 5; }
        #stats { font-size: clamp(2rem, 10vw, 3.5rem); font-weight: 900; margin: 0; text-shadow: 0 0 20px var(--accent); }
        .info-row { display: flex; gap: 10px; justify-content: center; font-size: 0.8rem; font-weight: bold; color: var(--accent); margin-top: 5px; }
        
        .lvl-bar { width: 280px; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 8px auto; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        #lvl-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #00ff88); box-shadow: 0 0 10px var(--accent); }

        #game-scene { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; }
        #pet-node { font-size: 50px; position: absolute; left: 15%; filter: drop-shadow(0 0 20px var(--accent)); animation: float 3s infinite ease-in-out; }
        #karas-node { font-size: clamp(120px, 45vw, 200px); filter: drop-shadow(0 0 40px rgba(0,242,255,0.2)); cursor: pointer; z-index: 2; transition: 0.1s; }
        #karas-node:active { transform: scale(0.85); }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        .side-menu { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 15; }
        .circle-btn { width: 55px; height: 55px; border-radius: 15px; font-size: 24px; background: var(--glass); border: 2px solid var(--accent); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); }
        
        .btn-group { position: fixed; bottom: 20px; display: flex; gap: 10px; z-index: 10; width: 90%; max-width: 500px; }
        .nav-btn { flex: 1; background: var(--glass); border: 2px solid var(--accent); color: white; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: 800; font-size: 0.75rem; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .overlay.active { display: flex; }
        .modal { background: #05101a; width: 95%; max-width: 450px; height: 75vh; border-radius: 30px; border: 2px solid var(--accent); display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .item-card { background: rgba(255,255,255,0.03); margin-bottom: 10px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        
        #event-timer { color: var(--event); font-weight: bold; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
        
        .daily-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .daily-day { background: var(--glass); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid transparent; font-size: 0.8rem; }
        .daily-day.active { border-color: var(--gold); background: rgba(255, 204, 0, 0.1); }

        .lang-switch { display: flex; gap: 5px; margin-bottom: 15px; }
        .lang-btn { flex: 1; padding: 10px; border: 1px solid var(--accent); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .lang-btn.active { background: var(--accent); color: black; }

        .pop { position: absolute; pointer-events: none; animation: floatUp 0.8s forwards; font-weight: 900; z-index: 1000; }
        @keyframes floatUp { to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div id="game-toast"></div>
<div id="ocean"></div>

<div class="ui-top">
    <div id="stats">0</div>
    <div class="info-row">
        <span><span data-t="crit">КРИТ</span>: <span id="crit-val">0</span>%</span>
        <span><span data-t="mult">МУЛЬТИ</span>: x<span id="mult-val">1</span></span>
    </div>
    <div class="lvl-bar"><div id="lvl-fill"></div></div>
    <div id="lvl-txt" style="font-size:0.8rem; opacity:0.7">УРОВЕНЬ: 1</div>
</div>

<div id="game-scene">
    <div id="pet-node"></div>
    <div id="karas-node">🐟</div>
</div>

<div class="side-menu">
    <div class="circle-btn" onclick="openModal('daily')" title="Ежедневно">🎁</div>
    <div class="circle-btn" onclick="openModal('events')" title="Ивенты">📅</div>
    <div class="circle-btn" onclick="openModal('wardrobe')">👔</div>
    <div class="circle-btn" onclick="openModal('pets-menu')">🐾</div>
    <div class="circle-btn" onclick="openModal('settings')">⚙️</div>
</div>

<div class="btn-group">
    <button class="nav-btn" onclick="openModal('shop')" data-t="shop">МАГАЗИН</button>
    <button class="nav-btn" style="border-color: var(--gold)" onclick="openModal('prestige')" data-t="prestige">ПРЕСТИЖ</button>
</div>

<div class="overlay" id="shop-overlay" onclick="if(event.target == this) closeModal('shop')">
    <div class="modal">
        <div style="display:flex; padding:10px; gap:5px">
            <button class="nav-btn" onclick="setTab('u')" data-t="upgrades">УЛУЧШЕНИЯ</button>
            <button class="nav-btn" onclick="setTab('b')" data-t="cases">КЕЙСЫ</button>
        </div>
        <div id="shop-list" class="content"></div>
    </div>
</div>

<div class="overlay" id="daily-overlay" onclick="if(event.target == this) closeModal('daily')">
    <div class="modal" style="height: auto; padding: 20px;">
        <h3 data-t="daily_title">ЕЖЕДНЕВНАЯ НАГРАДА</h3>
        <div class="daily-grid" id="daily-grid"></div>
        <button class="nav-btn" style="width:100%; margin-top:15px; background:var(--gold); color:black" onclick="claimDaily()" id="daily-claim-btn" data-t="claim">ЗАБРАТЬ</button>
    </div>
</div>

<div class="overlay" id="events-overlay" onclick="if(event.target == this) closeModal('events')">
    <div class="modal" style="padding: 20px;">
        <h3 data-t="events_title">ГЛОБАЛЬНЫЕ ИВЕНТЫ</h3>
        <div id="event-timer">--:--</div>
        <div id="events-list" class="content"></div>
    </div>
</div>

<div class="overlay" id="settings-overlay" onclick="if(event.target == this) closeModal('settings')">
    <div class="modal" style="height: auto; padding: 20px;">
        <h3 data-t="settings">НАСТРОЙКИ</h3>
        <div class="lang-switch">
            <button class="lang-btn" id="lang-ru" onclick="setLang('ru')">RU</button>
            <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
        </div>
        <button class="nav-btn" style="width:100%; margin-bottom:10px" onclick="saveGame(); showToast(game.lang==='ru'?'СОХРАНЕНО!':'SAVED!')" data-t="save">СОХРАНИТЬ</button>
        <button class="nav-btn" style="width:100%; border-color: var(--danger)" onclick="hardReset()" data-t="reset">СБРОСИТЬ ВСЁ</button>
    </div>
</div>

<div class="overlay" id="prestige-overlay" onclick="if(event.target == this) closeModal('prestige')">
    <div class="modal" style="height: auto; padding: 25px; text-align: center;">
        <h2 style="color: var(--gold)" data-t="prestige">ПРЕСТИЖ</h2>
        <p style="font-size: 0.9rem; opacity: 0.8;"><span data-t="prestige_desc">При перерождении вы теряете монеты и улучшения, но получаете икринки.</span></p>
        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin: 15px 0;">
            <div><span data-t="eggs">Икринки</span>: <b id="egg-count" style="color:var(--accent)">0</b></div>
            <div style="font-size: 0.8rem; margin-top: 5px; color: var(--gold)"><span data-t="next_egg">До следующей</span>: <span id="next-egg-cost">0</span> 🪙</div>
        </div>
        <button class="nav-btn" style="width:80%; max-width: 200px; background: var(--gold); color: black; padding: 8px; margin: 0 auto;" onclick="doPrestige()" data-t="ascend">ПЕРЕРОЖДЕНИЕ</button>
    </div>
</div>

<div class="overlay" id="pets-menu-overlay" onclick="if(event.target == this) closeModal('pets-menu')">
    <div class="modal"><h3 style="text-align:center" data-t="pets">ПИТОМЦЫ</h3><div id="pets-list-content" class="content"></div></div>
</div>

<div class="overlay" id="wardrobe-overlay" onclick="if(event.target == this) closeModal('wardrobe')">
    <div class="modal"><h3 style="text-align:center" data-t="wardrobe">ГАРДЕРОБ</h3><div id="wardrobe-list" class="content"></div></div>
</div>

<script>
    const TRANSLATIONS = {
        ru: {
            crit: "КРИТ", mult: "МУЛЬТИ", shop: "МАГАЗИН", prestige: "ПРЕСТИЖ",
            upgrades: "УЛУЧШЕНИЯ", cases: "КЕЙСЫ", daily_title: "ЕЖЕДНЕВНЫЕ НАГРАДЫ",
            events_title: "ГЛОБАЛЬНЫЕ ИВЕНТЫ", settings: "НАСТРОЙКИ", save: "СОХРАНИТЬ",
            reset: "СБРОСИТЬ", pets: "ПИТОМЦЫ", wardrobe: "ГАРДЕРОБ",
            claim: "ЗАБРАТЬ", ascend: "ПЕРЕРОЖДЕНИЕ", eggs: "Икринки",
            lvl: "УРОВЕНЬ", next_event: "СЛЕДУЮЩИЙ ЧЕРЕЗ", day: "День", select: "ВЫБРАТЬ",
            prestige_desc: "Обнуляет прогресс ради мощного бонуса к доходу.",
            next_egg: "Цена след. икринки", case_common: "ОБЫЧНЫЙ КЕЙС",
            case_epic: "ЭПИЧЕСКИЙ КЕЙС", case_legendary: "ЛЕГЕНДАРНЫЙ КЕЙС"
        },
        en: {
            crit: "CRIT", mult: "MULT", shop: "SHOP", prestige: "PRESTIGE",
            upgrades: "UPGRADES", cases: "CASES", daily_title: "DAILY REWARDS",
            events_title: "GLOBAL EVENTS", settings: "SETTINGS", save: "SAVE GAME",
            reset: "HARD RESET", pets: "PETS", wardrobe: "WARDROBE",
            claim: "CLAIM", ascend: "ASCEND", eggs: "Roe Eggs",
            lvl: "LEVEL", next_event: "NEXT IN", day: "Day", select: "SELECT",
            prestige_desc: "Reset progress for a massive income boost.",
            next_egg: "Next egg cost", case_common: "COMMON CASE",
            case_epic: "EPIC CASE", case_legendary: "LEGENDARY CASE"
        }
    };

    const DEFAULT_GAME = {
        coins: 0, clickP: 1, autoP: 0, exp: 0, lvl: 1, mult: 1, eggs: 0, 
        lang: 'ru', lastDaily: 0, dailyStep: 0,
        currentEmoji: "🐟", currentPet: null,
        items: {
            click: { ru: "Сила плавника", en: "Power Fin", cost: 15, p: 2, count: 0 },
            auto: { ru: "Авто-сачок", en: "Auto Net", cost: 150, p: 8, count: 0 },
            sonar: { ru: "Эхолот", en: "Echo Sonar", cost: 2000, p: 50, count: 0 },
            farm: { ru: "Морская ферма", en: "Sea Farm", cost: 25000, p: 350, count: 0 }
        },
        boxPrices: { common: 3000, epic: 50000, legendary: 500000 },
        skins: {
            def: { ru: "Обычный", en: "Common", e: "🐟", r: "common", b: true },
            gold: { ru: "Золотой", en: "Goldy", e: "🐠", r: "common", b: false },
            shark: { ru: "Акула", en: "Shark", e: "🦈", r: "rare", b: false }
        },
        pets: {
            shrimp: { ru: "Креветка", en: "Shrimp", e: "🦐", r: "common", bonus: 1.5, crit: 5, b: false },
            crab: { ru: "Краб", en: "Crab", e: "🦀", r: "rare", bonus: 4.0, crit: 12, b: false },
            penguin: { ru: "Пингвин", en: "Penguin", e: "🐧", r: "epic", bonus: 15.0, crit: 30, b: false }
        }
    };

    let game = JSON.parse(JSON.stringify(DEFAULT_GAME));
    let currentTab = 'u';

    function format(n) {
        if (n >= 1e12) return (n/1e12).toFixed(2) + "T";
        if (n >= 1e9) return (n/1e9).toFixed(2) + "B";
        if (n >= 1e6) return (n/1e6).toFixed(2) + "M";
        if (n >= 1e3) return (n/1e3).toFixed(1) + "k";
        return Math.floor(n);
    }

    function setLang(l) {
        game.lang = l;
        document.querySelectorAll('[data-t]').forEach(el => {
            const key = el.getAttribute('data-t');
            el.innerText = TRANSLATIONS[l][key];
        });
        document.getElementById('lang-ru').classList.toggle('active', l === 'ru');
        document.getElementById('lang-en').classList.toggle('active', l === 'en');
        updateUI(); 
    }

    function saveGame() { 
        localStorage.setItem('karas_ultra_v5', JSON.stringify(game)); 
    }
    
    function loadGame() {
        const saved = localStorage.getItem('karas_ultra_v5');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                // Глубокое объединение объектов, чтобы не потерять новые поля
                game = {...DEFAULT_GAME, ...parsed};
                game.items = {...DEFAULT_GAME.items, ...parsed.items};
                game.skins = {...DEFAULT_GAME.skins, ...parsed.skins};
                game.pets = {...DEFAULT_GAME.pets, ...parsed.pets};
            } catch(e) { console.error("Ошибка загрузки!"); }
        }
        
        // Сразу применяем настройки из сохранения
        setLang(game.lang);
        document.getElementById('karas-node').innerText = game.currentEmoji || "🐟";
        updatePetVisual();
        renderDaily();
        updateUI();
    }

    function updateUI() {
        document.getElementById('stats').innerText = format(game.coins);
        let nextLvlExp = game.lvl * 1000;
        document.getElementById('lvl-fill').style.width = Math.min(100, (game.exp / nextLvlExp * 100)) + "%";
        document.getElementById('lvl-txt').innerText = TRANSLATIONS[game.lang].lvl + ": " + game.lvl;
        document.getElementById('mult-val').innerText = game.mult;
        document.getElementById('crit-val').innerText = game.currentPet ? game.pets[game.currentPet].crit : 0;
        document.getElementById('egg-count').innerText = game.eggs;
        
        let nextEggCost = Math.pow(game.eggs + 1, 3) * 100000;
        document.getElementById('next-egg-cost').innerText = format(nextEggCost);
    }

    document.getElementById('karas-node').onmousedown = (e) => {
        let critChance = game.currentPet ? game.pets[game.currentPet].crit : 0;
        let isCrit = Math.random() * 100 < critChance;
        let boost = 1 + (game.eggs * 0.5); 
        let gain = game.clickP * game.mult * boost * (isCrit ? 5 : 1);
        
        game.coins += gain; game.exp += gain;
        if(game.exp >= game.lvl * 1000) { 
            game.exp = 0; game.lvl++; 
            showToast(game.lang==='ru'?"НОВЫЙ УРОВЕНЬ!":"LEVEL UP!"); 
        }
        
        spawnPop(e.clientX, e.clientY, "+" + format(gain), isCrit);
        updateUI();
    };

    function spawnPop(x, y, txt, isCrit) {
        const p = document.createElement('div');
        p.className = 'pop';
        p.style.color = isCrit ? 'var(--gold)' : 'white';
        p.innerText = txt;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    function renderDaily() {
        const grid = document.getElementById('daily-grid');
        grid.innerHTML = '';
        const now = Date.now();
        const canClaim = now - game.lastDaily > 86400000;
        
        for(let i=0; i<6; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = `daily-day ${game.dailyStep === i ? 'active' : ''}`;
            dayDiv.innerHTML = `${TRANSLATIONS[game.lang].day} ${i+1}<br>🎁`;
            grid.appendChild(dayDiv);
        }
        document.getElementById('daily-claim-btn').disabled = !canClaim;
    }

    function claimDaily() {
        game.coins += 1000 * (game.dailyStep + 1);
        game.lastDaily = Date.now();
        game.dailyStep = (game.dailyStep + 1) % 6;
        showToast(game.lang==='ru'?"НАГРАДА ПОЛУЧЕНА!":"CLAIMED!");
        renderDaily();
        updateUI();
        saveGame();
    }

    function updateEventTimer() {
        const now = new Date();
        const nextEvent = new Date();
        nextEvent.setHours(now.getHours() + 1, 0, 0, 0);
        const diff = nextEvent - now;
        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        const timerEl = document.getElementById('event-timer');
        if(timerEl) timerEl.innerText = `${TRANSLATIONS[game.lang].next_event}: ${mins}:${secs < 10 ? '0'+secs : secs}`;
    }

    function renderShop() {
        const list = document.getElementById('shop-list'); list.innerHTML = '';
        if(currentTab === 'u') {
            for(let id in game.items) {
                let it = game.items[id];
                list.innerHTML += `<div class="item-card" onclick="buyItem('${id}')">
                    <div><b>${it[game.lang]}</b><br><small>${TRANSLATIONS[game.lang].lvl}: ${it.count}</small></div>
                    <div style="color:var(--gold)">${format(it.cost)}</div></div>`;
            }
        } else {
            ['common','epic','legendary'].forEach(id => {
                let nameKey = 'case_' + id;
                list.innerHTML += `<div class="item-card" onclick="openBox('${id}')">
                    <div style="color:var(--${id})"><b>${TRANSLATIONS[game.lang][nameKey]}</b></div>
                    <div style="color:var(--gold)">${format(game.boxPrices[id])}</div></div>`;
            });
        }
    }

    function buyItem(id) {
        let it = game.items[id];
        if(game.coins >= it.cost) {
            game.coins -= it.cost; it.count++;
            if(id === 'click') game.clickP += it.p; else game.autoP += it.p;
            it.cost = Math.round(it.cost * 1.5);
            updateUI(); renderShop();
            saveGame();
        }
    }

    function doPrestige() {
        let nextEggCost = Math.pow(game.eggs + 1, 3) * 100000;
        if (game.coins >= nextEggCost) {
            if(confirm(game.lang==='ru'?"ПЕРЕРОДИТЬСЯ? Вы получите 1 икринку!":"ASCEND? You will get 1 egg!")) {
                game.eggs++;
                game.coins = 0;
                game.clickP = 1;
                game.autoP = 0;
                game.lvl = 1;
                game.exp = 0;
                for(let key in game.items) { 
                    game.items[key].count = 0; 
                    game.items[key].cost = (key === 'click' || key === 'auto') ? 15 : (key === 'sonar' ? 2000 : 25000); 
                }
                saveGame();
                location.reload();
            }
        } else {
            showToast(game.lang==='ru'?"Недостаточно монет!":"Not enough coins!");
        }
    }

    function renderPets() {
        const list = document.getElementById('pets-list-content'); list.innerHTML = '';
        for(let id in game.pets) {
            if(!game.pets[id].b) continue;
            list.innerHTML += `<div class="item-card" onclick="applyPet('${id}')">
                <div><b>${game.pets[id].e} ${game.pets[id][game.lang]}</b></div>
                <span>${game.currentPet === id ? '✅' : TRANSLATIONS[game.lang].select}</span></div>`;
        }
    }

    function renderWardrobe() {
        const list = document.getElementById('wardrobe-list'); list.innerHTML = '';
        for(let id in game.skins) {
            if(!game.skins[id].b) continue;
            list.innerHTML += `<div class="item-card" onclick="applySkin('${id}')">
                <div><b>${game.skins[id].e} ${game.skins[id][game.lang]}</b></div>
                <span>${TRANSLATIONS[game.lang].select}</span></div>`;
        }
    }

    function applySkin(id) { 
        game.currentEmoji = game.skins[id].e; 
        document.getElementById('karas-node').innerText = game.currentEmoji;
        closeModal('wardrobe'); 
        saveGame();
    }
    
    function applyPet(id) { game.currentPet = id; updatePetVisual(); closeModal('pets-menu'); saveGame(); updateUI(); }
    function updatePetVisual() { document.getElementById('pet-node').innerText = game.currentPet ? game.pets[game.currentPet].e : ""; }

    function openModal(id) { 
        document.getElementById(id + '-overlay').classList.add('active'); 
        if(id === 'shop') renderShop();
        if(id === 'pets-menu') renderPets();
        if(id === 'wardrobe') renderWardrobe();
    }
    function closeModal(id) { document.getElementById(id + '-overlay').classList.remove('active'); }
    function setTab(t) { currentTab = t; renderShop(); }
    
    function showToast(txt) {
        const t = document.getElementById('game-toast');
        t.innerText = txt; t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2000);
    }

    function hardReset() { 
        if(confirm(game.lang==='ru'?"СБРОСИТЬ ВСЁ?":"RESET EVERYTHING?")) { 
            localStorage.clear(); 
            location.reload(); 
        } 
    }

    // Основной цикл
    setInterval(() => {
        if(game.autoP > 0) {
            let pM = game.currentPet ? game.pets[game.currentPet].bonus : 1;
            let boost = 1 + (game.eggs * 0.5);
            game.coins += (game.autoP * game.mult * pM * boost) / 10;
            updateUI();
        }
        updateEventTimer();
    }, 100);

    // Автосохранение каждые 5 секунд
    setInterval(saveGame, 5000);

    // Запуск игры
    window.onload = loadGame;
</script>
</body>
</html>
