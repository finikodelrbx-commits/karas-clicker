<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KarasClicker: Evolution</title>
    <style>
        :root {
            --accent: #00f2ff; --gold: #ffcc00; --bg: #01080f; --glass: rgba(255, 255, 255, 0.1); 
            --danger: #ff4d4d; --common: #ffffff; --rare: #0070dd; --epic: #a335ee; --legendary: #ff8000;
        }
        * { user-select: none; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        
        #ocean { position: fixed; width: 100%; height: 100%; z-index: -2; background: linear-gradient(180deg, #0a1f33 0%, #01080f 100%); }
        .bubble { position: absolute; background: rgba(255,255,255,0.1); border-radius: 50%; bottom: -50px; animation: rise 10s infinite linear; }
        @keyframes rise { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-110vh); opacity: 0; } }

        #game-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 12px 30px; border-radius: 50px; font-weight: 900; z-index: 2000; transition: 0.5s; box-shadow: 0 0 20px var(--accent); }
        #game-toast.active { top: 20px; }

        .ui-top { text-align: center; margin-top: 15px; z-index: 5; }
        #stats { font-size: 3rem; font-weight: 900; margin: 0; text-shadow: 0 0 20px var(--accent); }
        .info-row { display: flex; gap: 15px; justify-content: center; font-size: 0.9rem; color: var(--accent); margin-top: 5px; }
        
        .lvl-bar { width: 250px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 10px auto; overflow: hidden; }
        #lvl-fill { width: 0%; height: 100%; background: var(--accent); transition: 0.3s; }

        #game-scene { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; }
        #pet-node { font-size: 50px; position: absolute; left: 20%; animation: float 3s infinite ease-in-out; }
        #karas-node { font-size: 150px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 20px rgba(0,242,255,0.3)); }
        #karas-node:active { transform: scale(0.9); }
        
        #case-opening { position: absolute; font-size: 100px; z-index: 100; display: none; flex-direction: column; align-items: center; cursor: pointer; }
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(5deg); } 75% { transform: rotate(-5deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; }
        .circle-btn { width: 50px; height: 50px; border-radius: 15px; background: var(--glass); border: 1px solid var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; backdrop-filter: blur(5px); }

        .btn-group { position: fixed; bottom: 20px; display: flex; gap: 10px; width: 90%; }
        .nav-btn { flex: 1; background: var(--glass); border: 1px solid var(--accent); color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .overlay.active { display: flex; }
        .modal { background: #05101a; width: 90%; max-width: 400px; max-height: 70vh; border-radius: 25px; border: 1px solid var(--accent); overflow-y: auto; padding: 20px; }

        .item-card { background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .pop { position: absolute; pointer-events: none; animation: popUp 0.6s forwards; font-weight: 900; z-index: 1000; }
        @keyframes popUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div id="game-toast"></div>
<div id="ocean"></div>

<div class="ui-top">
    <div id="stats">0</div>
    <div class="info-row">
        <span>⚡ <span id="crit-val">0</span>%</span>
        <span>🥚 <span id="egg-count-top">0</span></span>
    </div>
    <div class="lvl-bar"><div id="lvl-fill"></div></div>
    <div id="lvl-txt">УРОВЕНЬ: 1</div>
</div>

<div id="game-scene">
    <div id="pet-node"></div>
    <div id="karas-node" onclick="clickKaras(event)">🐟</div>
    <div id="case-opening" onclick="hitCase()">📦</div>
</div>

<div class="side-menu">
    <div class="circle-btn" onclick="openModal('wardrobe')">👔</div>
    <div class="circle-btn" onclick="openModal('pets-menu')">🐾</div>
    <div class="circle-btn" onclick="openModal('settings')">⚙️</div>
</div>

<div class="btn-group">
    <button class="nav-btn" onclick="openModal('shop')">МАГАЗИН</button>
    <button class="nav-btn" style="border-color: var(--gold); color: var(--gold)" onclick="openModal('prestige')">ПРЕСТИЖ</button>
</div>

<div class="overlay" id="shop-overlay" onclick="if(event.target==this) closeModal('shop')">
    <div class="modal">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <button class="nav-btn" onclick="setTab('u')">АПЫ</button>
            <button class="nav-btn" onclick="setTab('b')">КЕЙСЫ</button>
        </div>
        <div id="shop-list"></div>
    </div>
</div>

<div class="overlay" id="prestige-overlay" onclick="if(event.target==this) closeModal('prestige')">
    <div class="modal" style="text-align:center">
        <h2 style="color:var(--gold)">ПРЕСТИЖ</h2>
        <p>Сброс прогресса даст +70% дохода за каждую икринку.</p>
        <p>У вас: <b id="egg-count">0</b></p>
        <button class="nav-btn" onclick="doPrestige()" id="prestige-btn">ПЕРЕРОЖДЕНИЕ</button>
    </div>
</div>

<div class="overlay" id="pets-menu-overlay" onclick="if(event.target==this) closeModal('pets-menu')"><div class="modal"><h3>ПИТОМЦЫ</h3><div id="pets-list"></div></div></div>
<div class="overlay" id="wardrobe-overlay" onclick="if(event.target==this) closeModal('wardrobe')"><div class="modal"><h3>ГАРДЕРОБ</h3><div id="wardrobe-list"></div></div></div>
<div class="overlay" id="settings-overlay" onclick="if(event.target==this) closeModal('settings')">
    <div class="modal">
        <h3>НАСТРОЙКИ</h3>
        <button class="nav-btn" style="width:100%; margin-bottom:10px" onclick="saveGame(); showToast('Сохранено!')">СОХРАНИТЬ</button>
        <button class="nav-btn" style="width:100%; border-color:var(--danger)" onclick="hardReset()">СБРОСИТЬ ВСЁ</button>
    </div>
</div>

<script>
    let game = {
        coins: 0, clickP: 1, autoP: 0, exp: 0, lvl: 1, eggs: 0,
        currentEmoji: "🐟", currentPet: null,
        items: {
            fin: { name: "Сила плавника", cost: 15, p: 1, count: 0 },
            net: { name: "Авто-сачок", cost: 100, p: 2, count: 0 },
            sonar: { name: "Эхолот", cost: 1000, p: 15, count: 0 }
        },
        skins: {
            def: { name: "Обычный", e: "🐟", b: true },
            gold: { name: "Золотой", e: "🐠", b: false },
            shark: { name: "Акула", e: "🦈", b: false }
        },
        pets: {
            shrimp: { name: "Креветка", e: "🦐", bonus: 1.5, crit: 10, b: false },
            crab: { name: "Краб", e: "🦀", bonus: 3, crit: 20, b: false }
        }
    };

    let currentTab = 'u';
    let caseHealth = 0;

    function format(n) { return n >= 1000 ? (n/1000).toFixed(1) + 'k' : Math.floor(n); }

    function updateUI() {
        document.getElementById('stats').innerText = format(game.coins);
        document.getElementById('egg-count').innerText = document.getElementById('egg-count-top').innerText = game.eggs;
        document.getElementById('lvl-txt').innerText = "УРОВЕНЬ: " + game.lvl;
        let nextLvl = game.lvl * 500;
        document.getElementById('lvl-fill').style.width = (game.exp / nextLvl * 100) + "%";
        document.getElementById('crit-val').innerText = game.currentPet ? game.pets[game.currentPet].crit : 0;
    }

    function clickKaras(e) {
        let crit = game.currentPet ? game.pets[game.currentPet].crit : 0;
        let isCrit = Math.random() * 100 < crit;
        let power = (game.clickP * (1 + game.eggs * 0.7)) * (isCrit ? 5 : 1);
        
        game.coins += power;
        game.exp += power;
        
        if(game.exp >= game.lvl * 500) {
            game.exp = 0; game.lvl++;
            showToast("НОВЫЙ УРОВЕНЬ!");
        }
        
        spawnPop(e.clientX, e.clientY, "+" + format(power), isCrit);
        updateUI();
    }

    function spawnPop(x, y, txt, crit) {
        let p = document.createElement('div');
        p.className = 'pop';
        p.innerText = txt;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        p.style.color = crit ? 'var(--gold)' : 'white';
        p.style.fontSize = crit ? '2rem' : '1.2rem';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
    }

    function openModal(id) {
        document.getElementById(id + '-overlay').classList.add('active');
        if(id === 'shop') renderShop();
        if(id === 'pets-menu') renderPets();
        if(id === 'wardrobe') renderSkins();
    }

    function closeModal(id) { document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active')); }

    function setTab(t) { currentTab = t; renderShop(); }

    function renderShop() {
        let html = '';
        if(currentTab === 'u') {
            for(let id in game.items) {
                let it = game.items[id];
                html += `<div class="item-card" onclick="buyItem('${id}')">
                    <span>${it.name} (x${it.count})</span>
                    <b style="color:var(--gold)">${format(it.cost)}</b>
                </div>`;
            }
        } else {
            html += `<div class="item-card" onclick="startCase()">
                <span>СЛУЧАЙНЫЙ КЕЙС</span>
                <b style="color:var(--gold)">5000</b>
            </div>`;
        }
        document.getElementById('shop-list').innerHTML = html;
    }

    function buyItem(id) {
        let it = game.items[id];
        if(game.coins >= it.cost) {
            game.coins -= it.cost;
            it.count++;
            if(id === 'fin') game.clickP += it.p;
            else game.autoP += it.p;
            it.cost = Math.round(it.cost * 1.5);
            renderShop(); updateUI();
        }
    }

    function startCase() {
        if(game.coins < 5000) return showToast("Мало монет!");
        game.coins -= 5000;
        closeModal();
        caseHealth = 5;
        document.getElementById('karas-node').style.display = 'none';
        document.getElementById('case-opening').style.display = 'flex';
        updateUI();
    }

    function hitCase() {
        caseHealth--;
        let c = document.getElementById('case-opening');
        c.classList.add('shake');
        setTimeout(() => c.classList.remove('shake'), 100);
        if(caseHealth <= 0) {
            c.style.display = 'none';
            document.getElementById('karas-node').style.display = 'block';
            unlockRandom();
        }
    }

    function unlockRandom() {
        let chance = Math.random();
        if(chance > 0.5) {
            let keys = Object.keys(game.pets);
            let p = keys[Math.floor(Math.random()*keys.length)];
            game.pets[p].b = true;
            showToast("Выпал питомец: " + game.pets[p].e);
        } else {
            let keys = Object.keys(game.skins);
            let s = keys[Math.floor(Math.random()*keys.length)];
            game.skins[s].b = true;
            showToast("Выпал скин: " + game.skins[s].e);
        }
        saveGame();
    }

    function renderPets() {
        let html = '';
        for(let id in game.pets) {
            if(!game.pets[id].b) continue;
            html += `<div class="item-card" onclick="game.currentPet='${id}'; closeModal(); updateUI();">
                <span>${game.pets[id].e} ${game.pets[id].name}</span>
                <span>${game.currentPet==id?'✅':'🔘'}</span>
            </div>`;
        }
        document.getElementById('pets-list').innerHTML = html || 'Пусто...';
    }

    function renderSkins() {
        let html = '';
        for(let id in game.skins) {
            if(!game.skins[id].b) continue;
            html += `<div class="item-card" onclick="game.currentEmoji='${game.skins[id].e}'; document.getElementById('karas-node').innerText=game.currentEmoji; closeModal();">
                <span>${game.skins[id].e} ${game.skins[id].name}</span>
                <span>${game.currentEmoji==game.skins[id].e?'✅':'🔘'}</span>
            </div>`;
        }
        document.getElementById('wardrobe-list').innerHTML = html;
    }

    function doPrestige() {
        let cost = Math.pow(game.eggs + 1, 3) * 10000;
        if(game.coins >= cost) {
            game.eggs++;
            game.coins = 0; game.clickP = 1; game.autoP = 0; game.exp = 0; game.lvl = 1;
            for(let k in game.items) { game.items[k].count = 0; game.items[k].cost = 15; }
            saveGame(); location.reload();
        } else {
            showToast("Нужно: " + format(cost));
        }
    }

    function showToast(t) {
        let el = document.getElementById('game-toast');
        el.innerText = t; el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 2000);
    }

    function saveGame() { localStorage.setItem('karas_save', JSON.stringify(game)); }
    function loadGame() {
        let s = localStorage.getItem('karas_save');
        if(s) {
            let data = JSON.parse(s);
            game = {...game, ...data};
            document.getElementById('karas-node').innerText = game.currentEmoji;
        }
        updateUI();
    }

    setInterval(() => {
        if(game.autoP > 0) {
            let bonus = game.currentPet ? game.pets[game.currentPet].bonus : 1;
            game.coins += (game.autoP * bonus * (1 + game.eggs * 0.7)) / 10;
            updateUI();
        }
    }, 100);

    // Пузырьки
    for(let i=0; i<10; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        b.style.left = Math.random()*100+'%';
        b.style.width = b.style.height = (Math.random()*15+5)+'px';
        b.style.animationDelay = Math.random()*5+'s';
        document.getElementById('ocean').appendChild(b);
    }

    window.onload = loadGame;
    function hardReset() { if(confirm("Удалить весь прогресс?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
