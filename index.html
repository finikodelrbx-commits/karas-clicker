<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KarasClicker: Evolution ONLINE</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        :root {
            --accent: #00f2ff; --gold: #ffcc00; --bg: #01080f; --glass: rgba(255, 255, 255, 0.1); 
            --danger: #ff4d4d; --common: #ffffff; --rare: #0070dd; --epic: #a335ee; --legendary: #ff8000;
            --event: #ff00ff;
        }
        * { user-select: none; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        
        #ocean { position: fixed; width: 100%; height: 100%; z-index: -2; background: linear-gradient(180deg, #0a1f33 0%, #01080f 100%); }
        .bubble { position: absolute; background: rgba(255,255,255,0.1); border-radius: 50%; bottom: -50px; animation: rise 10s infinite linear; }
        @keyframes rise { 0% { transform: translateY(0) translateX(0); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-110vh) translateX(50px); opacity: 0; } }

        #game-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: black; padding: 12px 30px; border-radius: 50px; font-weight: 900; z-index: 6000; transition: 0.5s; box-shadow: 0 0 20px var(--accent); }
        #game-toast.active { top: 20px; }

        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--glass); padding: 30px; border-radius: 25px; border: 2px solid var(--accent); width: 100%; max-width: 350px; text-align: center; backdrop-filter: blur(20px); }
        .auth-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--accent); color: white; padding: 12px; border-radius: 10px; margin: 10px 0; }

        .ui-top { text-align: center; margin-top: 15px; z-index: 5; animation: slideDown 0.5s ease-out; }
        #stats { font-size: clamp(2.5rem, 12vw, 4rem); font-weight: 900; margin: 0; text-shadow: 0 0 20px var(--accent); }
        .info-row { display: flex; gap: 10px; justify-content: center; font-size: 0.85rem; font-weight: bold; color: var(--accent); margin-top: 5px; opacity: 0.9; }
        
        .lvl-bar { width: 280px; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 8px auto; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 5px #000; }
        #lvl-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #00ff88); transition: width 0.3s; }

        #chat-trigger { position: fixed; top: 20px; left: 20px; z-index: 100; background: var(--glass); border: 2px solid var(--accent); border-radius: 15px; padding: 10px; cursor: pointer; backdrop-filter: blur(10px); }

        #game-scene { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; }
        #pet-node { font-size: 50px; position: absolute; left: 15%; filter: drop-shadow(0 0 20px var(--accent)); animation: float 3s infinite ease-in-out; }
        #karas-node { font-size: clamp(120px, 45vw, 220px); filter: drop-shadow(0 0 40px rgba(0,242,255,0.2)); cursor: pointer; z-index: 2; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #karas-node:active { transform: scale(0.8); }
        
        #case-opening { position: absolute; font-size: 100px; z-index: 100; cursor: pointer; display: none; flex-direction: column; align-items: center; }
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(-1deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .side-menu { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 15; }
        .circle-btn { width: 55px; height: 55px; border-radius: 18px; font-size: 24px; background: var(--glass); border: 2px solid var(--accent); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); }
        
        .btn-group { position: fixed; bottom: 20px; display: flex; gap: 10px; z-index: 10; width: 90%; max-width: 500px; }
        .nav-btn { flex: 1; background: var(--glass); border: 2px solid var(--accent); color: white; padding: 14px; border-radius: 18px; cursor: pointer; font-weight: 800; font-size: 0.8rem; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .overlay.active { display: flex; }
        .modal { background: #05101a; width: 95%; max-width: 450px; height: 75vh; border-radius: 35px; border: 2px solid var(--accent); display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .item-card { background: rgba(255,255,255,0.03); margin-bottom: 12px; padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        
        #chat-content { display: flex; flex-direction: column; height: 100%; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 12px; font-size: 0.9rem; border-left: 3px solid var(--accent); word-break: break-word; }
        .msg b { color: var(--accent); }
        .msg.system { border-left-color: var(--gold); font-style: italic; opacity: 0.8; }
        #chat-input-area { display: flex; padding: 15px; gap: 10px; background: rgba(0,0,0,0.3); }
        #chat-input { flex: 1; background: var(--glass); border: 1px solid var(--accent); color: white; padding: 10px; border-radius: 10px; }

        .pop { position: absolute; pointer-events: none; animation: floatUp 0.8s forwards; font-weight: 900; z-index: 1000; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 style="color:var(--accent); margin-bottom: 5px;">KARAS ONLINE</h2>
        <p style="font-size:0.8rem; opacity:0.7; margin-bottom: 20px;">Авторизуйтесь для входа</p>
        <input type="text" id="auth-user" class="auth-input" placeholder="Имя пользователя">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="nav-btn" onclick="handleAuth('login')">ВХОД</button>
            <button class="nav-btn" style="border-color:var(--gold); color:var(--gold)" onclick="handleAuth('reg')">РЕГИСТРАЦИЯ</button>
        </div>
    </div>
</div>

<div id="game-toast"></div>
<div id="ocean"></div>

<div id="chat-trigger" onclick="openModal('chat')">💬 ЧАТ</div>

<div class="ui-top">
    <div id="stats">0</div>
    <div class="info-row">
        <span>⚡ <span id="crit-val">0</span>%</span>
        <span>💎 x<span id="mult-val">1</span></span>
        <span>🥚 <span id="egg-count-top">0</span></span>
    </div>
    <div class="lvl-bar"><div id="lvl-fill"></div></div>
    <div id="lvl-txt">УРОВЕНЬ: 1</div>
    <div style="font-size: 10px; opacity: 0.5; margin-top: 5px;">ИГРОК: <b id="display-nick">...</b></div>
</div>

<div id="game-scene">
    <div id="pet-node"></div>
    <div id="karas-node">🐟</div>
    <div id="case-opening" onclick="hitCase()">
        <span id="case-emoji">📦</span>
        <div style="font-size: 14px; background: var(--accent); color: black; padding: 5px 10px; border-radius: 10px; margin-top: 10px; font-weight: bold;">ЖМИ!</div>
    </div>
</div>

<div class="side-menu">
    <div class="circle-btn" onclick="openModal('daily')">🎁</div>
    <div class="circle-btn" onclick="openModal('events')">📅</div>
    <div class="circle-btn" onclick="openModal('wardrobe')">👔</div>
    <div class="circle-btn" onclick="openModal('pets-menu')">🐾</div>
    <div class="circle-btn" onclick="openModal('settings')">⚙️</div>
</div>

<div class="btn-group">
    <button class="nav-btn" onclick="openModal('shop')" data-t="shop">МАГАЗИН</button>
    <button class="nav-btn" style="border-color: var(--gold); color: var(--gold)" onclick="openModal('prestige')" data-t="prestige">ПРЕСТИЖ</button>
</div>

<div class="overlay" id="chat-overlay" onclick="if(event.target == this) closeModal('chat')">
    <div class="modal">
        <h3 style="text-align:center">ГЛОБАЛЬНЫЙ ЧАТ</h3>
        <div id="chat-content">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Введите сообщение...">
                <button class="nav-btn" style="flex:none; width:60px" id="send-btn" onclick="sendChatMessage()">></button>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="shop-overlay" onclick="if(event.target == this) closeModal('shop')"><div class="modal"><div style="display:flex; padding:15px; gap:10px"><button class="nav-btn" onclick="setTab('u')" data-t="upgrades">УЛУЧШЕНИЯ</button><button class="nav-btn" onclick="setTab('b')" data-t="cases">КЕЙСЫ</button></div><div id="shop-list" class="content"></div></div></div>
<div class="overlay" id="daily-overlay" onclick="if(event.target == this) closeModal('daily')"><div class="modal" style="height: auto; padding: 25px;"><h3 data-t="daily_title" style="text-align:center">ЕЖЕДНЕВНЫЙ БОНУС</h3><div id="daily-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px"></div><button class="nav-btn" style="width:100%; margin-top:20px; background:var(--gold); color:black" onclick="claimDaily()" id="daily-claim-btn" data-t="claim">ЗАБРАТЬ</button></div></div>
<div class="overlay" id="events-overlay" onclick="if(event.target == this) closeModal('events')"><div class="modal"><h3 style="text-align:center" data-t="events_title">ИВЕНТЫ</h3><div id="event-timer" style="text-align:center; font-weight:bold; color:var(--event); margin-bottom:10px">00:00</div><div id="events-list" class="content"></div></div></div>
<div class="overlay" id="settings-overlay" onclick="if(event.target == this) closeModal('settings')"><div class="modal" style="height: auto; padding: 25px;"><h3 data-t="settings">НАСТРОЙКИ</h3><div style="background: rgba(0,242,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; border: 1px solid var(--accent);">🌐 Игроков онлайн: <b id="online-count">1</b></div><button class="nav-btn" style="width:100%; margin-bottom:10px" onclick="saveGame(); showToast('OK!')" data-t="save">СОХРАНИТЬ</button><button class="nav-btn" style="width:100%; border-color: var(--danger)" onclick="hardReset()" data-t="reset">СБРОСИТЬ</button><button class="nav-btn" style="width:100%; margin-top: 15px; border-color: white" onclick="logout()">ВЫЙТИ ИЗ АККАУНТА</button></div></div>
<div class="overlay" id="prestige-overlay" onclick="if(event.target == this) closeModal('prestige')"><div class="modal" style="height: auto; padding: 25px; text-align: center;"><h2 style="color: var(--gold)" data-t="prestige">ПРЕСТИЖ</h2><p style="font-size: 0.9rem; opacity: 0.8;" data-t="prestige_desc"></p><div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin: 15px 0;"><div data-t="eggs">Икринки</div>: <b id="egg-count" style="color:var(--accent)">0</b><div style="font-size: 0.8rem; margin-top: 5px; color: var(--gold)"><span data-t="next_egg"></span>: <span id="next-egg-cost">0</span></div></div><button class="nav-btn" onclick="doPrestige()" data-t="ascend">ПЕРЕРОЖДЕНИЕ</button></div></div>
<div class="overlay" id="pets-menu-overlay" onclick="if(event.target == this) closeModal('pets-menu')"><div class="modal"><h3 style="text-align:center" data-t="pets">ПИТОМЦЫ</h3><div id="pets-list-content" class="content"></div></div></div>
<div class="overlay" id="wardrobe-overlay" onclick="if(event.target == this) closeModal('wardrobe')"><div class="modal"><h3 style="text-align:center" data-t="wardrobe">ГАРДЕРОБ</h3><div id="wardrobe-list" class="content"></div></div></div>

<script>
    // --- ДАННЫЕ И ОНЛАЙН ---
    const pubnub = new PubNub({
        publishKey: 'pub-c-4638703e-8260-449e-953e-52f01f89389e',
        subscribeKey: 'sub-c-4638703e-8260-449e-953e-52f01f89389e',
        uuid: localStorage.getItem('karas_uuid') || "p_" + Math.random().toString(36).substring(7)
    });
    localStorage.setItem('karas_uuid', pubnub.getUUID());

    const DEFAULT_GAME = {
        coins: 0, clickP: 1, autoP: 0, exp: 0, lvl: 1, mult: 1, eggs: 0, 
        lang: 'ru', lastDaily: 0, dailyStep: 0, nick: "Player",
        currentEmoji: "🐟", currentPet: null,
        items: {
            click: { ru: "Сила плавника", en: "Power Fin", cost: 15, p: 2, count: 0 },
            auto: { ru: "Авто-сачок", en: "Auto Net", cost: 150, p: 8, count: 0 },
            sonar: { ru: "Эхолот", en: "Echo Sonar", cost: 2000, p: 50, count: 0 },
            farm: { ru: "Морская ферма", en: "Sea Farm", cost: 30000, p: 400, count: 0 },
            station: { ru: "Глубоководная станция", en: "Deep Station", cost: 250000, p: 2500, count: 0 }
        },
        boxPrices: { common: 5000, epic: 75000, legendary: 1000000 },
        skins: {
            def: { ru: "Обычный", en: "Common", e: "🐟", r: "common", b: true },
            gold: { ru: "Золотой", en: "Goldy", e: "🐠", r: "common", b: false },
            shark: { ru: "Акула", en: "Shark", e: "🦈", r: "rare", b: false },
            mecha: { ru: "Меха-Карась", en: "Mecha-Fish", e: "🤖", r: "epic", b: false },
            ghost: { ru: "Призрак", en: "Ghost", e: "👻", r: "legendary", b: false }
        },
        pets: {
            shrimp: { ru: "Креветка", en: "Shrimp", e: "🦐", r: "common", bonus: 1.5, crit: 5, b: false },
            crab: { ru: "Краб", en: "Crab", e: "🦀", r: "rare", bonus: 4.0, crit: 12, b: false },
            penguin: { ru: "Пингвин", en: "Penguin", e: "🐧", r: "epic", bonus: 15.0, crit: 30, b: false },
            axolotl: { ru: "Аксолотль", en: "Axolotl", e: "🦎", r: "epic", bonus: 25.0, crit: 45, b: false },
            whale: { ru: "Кит", en: "Whale", e: "🐳", r: "legendary", bonus: 100.0, crit: 60, b: false }
        }
    };

    let game = JSON.parse(JSON.stringify(DEFAULT_GAME));
    let currentUser = null;
    let eventMult = 1;

    // --- АВТОРИЗАЦИЯ ---
    function handleAuth(type) {
        const user = document.getElementById('auth-user').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        if(!user || !pass) return alert("Введите данные!");
        let accounts = JSON.parse(localStorage.getItem('karas_accounts') || '{}');
        if(type === 'reg') {
            if(accounts[user]) return alert("Ник уже занят!");
            accounts[user] = { pass: pass, data: JSON.parse(JSON.stringify(DEFAULT_GAME)) };
            accounts[user].data.nick = user;
            localStorage.setItem('karas_accounts', JSON.stringify(accounts));
            alert("Успех! Теперь войдите.");
        } else {
            if(!accounts[user] || accounts[user].pass !== pass) return alert("Ошибка входа!");
            loginAs(user);
        }
    }

    function loginAs(user) {
        let accounts = JSON.parse(localStorage.getItem('karas_accounts') || '{}');
        currentUser = user;
        game = accounts[user].data;
        sessionStorage.setItem('karas_logged_in', user); // Сессия не сбрасывается при обновлении
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('display-nick').innerText = user;
        initGame();
    }

    function logout() { sessionStorage.removeItem('karas_logged_in'); location.reload(); }

    // --- ЧАТ ---
    pubnub.subscribe({ channels: ['karas_chat_global'], withPresence: true });
    pubnub.addListener({
        message: (m) => addMsgToUI(m.message.user, m.message.text, m.message.type === 'system'),
        presence: (p) => document.getElementById('online-count').innerText = p.occupancy || 1
    });

    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        pubnub.publish({
            channel: 'karas_chat_global',
            message: { user: currentUser, text: input.value.trim(), type: 'chat' }
        });
        input.value = '';
    }

    function addMsgToUI(user, text, isSystem) {
        const box = document.getElementById('chat-messages');
        const m = document.createElement('div');
        m.className = isSystem ? 'msg system' : 'msg';
        m.innerHTML = isSystem ? text : `<b>${user}:</b> ${text}`;
        box.appendChild(m);
        box.scrollTop = box.scrollHeight;
    }

    // --- ЛОГИКА ИГРЫ ---
    const TRANSLATIONS = {
        ru: {
            crit: "КРИТ", mult: "МУЛЬТИ", shop: "МАГАЗИН", prestige: "ПРЕСТИЖ", upgrades: "УЛУЧШЕНИЯ", cases: "КЕЙСЫ", 
            daily_title: "ЕЖЕДНЕВНЫЕ НАГРАДЫ", events_title: "ИВЕНТЫ", settings: "НАСТРОЙКИ", save: "СОХРАНИТЬ", 
            reset: "СБРОСИТЬ", pets: "ПИТОМЦЫ", wardrobe: "ГАРДЕРОБ", claim: "ЗАБРАТЬ", ascend: "ПЕРЕРОЖДЕНИЕ", 
            eggs: "Икринки", lvl: "УРОВЕНЬ", day: "День", select: "ВЫБРАТЬ", prestige_desc: "Сброс ради бонуса.",
            next_egg: "Цена икринки", case_common: "ОБЫЧНЫЙ КЕЙС", case_epic: "ЭПИЧЕСКИЙ КЕЙС", case_legendary: "ЛЕГЕНДАРНЫЙ КЕЙС"
        }
    };

    let currentTab = 'u';
    let caseHealth = 0;
    let openingType = 'common';

    function initGame() {
        document.getElementById('karas-node').innerText = game.currentEmoji;
        if(game.currentPet) document.getElementById('pet-node').innerText = game.pets[game.currentPet].e;
        setLang(game.lang);
        updateUI();
        startEventSystem();
    }

    function format(n) {
        if (n >= 1e12) return (n/1e12).toFixed(2) + "T";
        if (n >= 1e9) return (n/1e9).toFixed(2) + "B";
        if (n >= 1e6) return (n/1e6).toFixed(2) + "M";
        if (n >= 1e3) return (n/1e3).toFixed(1) + "k";
        return Math.floor(n);
    }

    function updateUI() {
        document.getElementById('stats').innerText = format(game.coins);
        let nextLvlExp = game.lvl * 2000;
        document.getElementById('lvl-fill').style.width = Math.min(100, (game.exp / nextLvlExp * 100)) + "%";
        document.getElementById('lvl-txt').innerText = (TRANSLATIONS[game.lang].lvl || "LEVEL") + ": " + game.lvl;
        document.getElementById('mult-val').innerText = (game.mult * eventMult).toFixed(1);
        document.getElementById('crit-val').innerText = game.currentPet ? game.pets[game.currentPet].crit : 0;
        document.getElementById('egg-count').innerText = document.getElementById('egg-count-top').innerText = game.eggs;
        let nextEggCost = Math.pow(game.eggs + 1, 4) * 200000;
        document.getElementById('next-egg-cost').innerText = format(nextEggCost);
    }

    document.getElementById('karas-node').onmousedown = (e) => {
        let critChance = game.currentPet ? game.pets[game.currentPet].crit : 0;
        let isCrit = Math.random() * 100 < critChance;
        let boost = (1 + (game.eggs * 0.7)) * eventMult; 
        let gain = game.clickP * game.mult * boost * (isCrit ? 6 : 1);
        game.coins += gain; game.exp += gain;
        if(game.exp >= game.lvl * 2000) { game.exp = 0; game.lvl++; showToast("LEVEL UP!"); }
        spawnPop(e.clientX, e.clientY, "+" + format(gain), isCrit);
        updateUI();
    };

    function spawnPop(x, y, txt, isCrit) {
        const p = document.createElement('div');
        p.className = 'pop';
        p.style.color = isCrit ? 'var(--gold)' : 'white';
        p.innerText = txt; p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    // --- КЕЙСЫ (ИСПРАВЛЕНО) ---
    function openBox(type) {
        if (game.coins >= game.boxPrices[type]) {
            game.coins -= game.boxPrices[type];
            openingType = type;
            closeModal('shop');
            caseHealth = 3;
            document.getElementById('karas-node').style.display = 'none';
            document.getElementById('case-opening').style.display = 'flex';
            updateUI();
        } else { showToast("Мало монет!"); }
    }

    function hitCase() {
        caseHealth--;
        const box = document.getElementById('case-opening');
        box.classList.add('shake');
        setTimeout(() => box.classList.remove('shake'), 200);
        if (caseHealth <= 0) finishOpening();
    }

    function finishOpening() {
        document.getElementById('case-opening').style.display = 'none';
        document.getElementById('karas-node').style.display = 'block';
        
        let poolPets = [];
        let poolSkins = [];
        
        // Фильтруем пулы по редкости кейса
        for(let id in game.pets) {
            if(openingType === 'common' && game.pets[id].r === 'common') poolPets.push({id, type:'pet'});
            if(openingType === 'epic' && (game.pets[id].r === 'rare' || game.pets[id].r === 'epic')) poolPets.push({id, type:'pet'});
            if(openingType === 'legendary' && (game.pets[id].r === 'epic' || game.pets[id].r === 'legendary')) poolPets.push({id, type:'pet'});
        }
        for(let id in game.skins) {
            if(openingType === 'common' && game.skins[id].r === 'common') poolSkins.push({id, type:'skin'});
            if(openingType === 'epic' && (game.skins[id].r === 'rare' || game.skins[id].r === 'epic')) poolSkins.push({id, type:'skin'});
            if(openingType === 'legendary' && (game.skins[id].r === 'epic' || game.skins[id].r === 'legendary')) poolSkins.push({id, type:'skin'});
        }

        let fullPool = [...poolPets, ...poolSkins];
        let win = fullPool[Math.floor(Math.random() * fullPool.length)];

        if(win.type === 'pet') {
            game.pets[win.id].b = true;
            showToast("ВЫПАЛ ПИТОМЕЦ: " + game.pets[win.id].e);
        } else {
            game.skins[win.id].b = true;
            showToast("ВЫПАЛ СКИН: " + game.skins[win.id].e);
        }
        saveGame();
    }

    // --- ИВЕНТЫ ---
    function startEventSystem() {
        setInterval(() => {
            let now = new Date();
            let sec = 60 - now.getSeconds();
            document.getElementById('event-timer').innerText = "ОБНОВЛЕНИЕ: 00:" + (sec < 10 ? "0"+sec : sec);
            if(sec === 1) {
                eventMult = Math.random() > 0.7 ? 2 : 1;
                if(eventMult > 1) showToast("🚀 БУСТ x2 ВКЛЮЧЕН!");
                updateUI();
            }
        }, 1000);
    }

    function buyItem(id) {
        let it = game.items[id];
        if(game.coins >= it.cost) {
            game.coins -= it.cost; it.count++;
            if(id === 'click') game.clickP += it.p; else game.autoP += it.p;
            it.cost = Math.round(it.cost * 1.7);
            updateUI(); renderShop(); saveGame();
        }
    }

    function renderShop() {
        const list = document.getElementById('shop-list'); list.innerHTML = '';
        if(currentTab === 'u') {
            for(let id in game.items) {
                let it = game.items[id];
                list.innerHTML += `<div class="item-card" onclick="buyItem('${id}')">
                    <div><b>${it[game.lang]}</b><br><small>LVL: ${it.count}</small></div>
                    <div style="color:var(--gold)">${format(it.cost)} 🪙</div></div>`;
            }
        } else {
            ['common','epic','legendary'].forEach(id => {
                list.innerHTML += `<div class="item-card" onclick="openBox('${id}')">
                    <div style="color:var(--${id})"><b>${TRANSLATIONS[game.lang]['case_'+id]}</b></div>
                    <div style="color:var(--gold)">${format(game.boxPrices[id])} 🪙</div></div>`;
            });
        }
    }

    function saveGame() { 
        if(!currentUser) return;
        let accounts = JSON.parse(localStorage.getItem('karas_accounts') || '{}');
        accounts[currentUser].data = game;
        localStorage.setItem('karas_accounts', JSON.stringify(accounts));
    }

    function loadSession() {
        let sessionUser = sessionStorage.getItem('karas_logged_in');
        if(sessionUser) loginAs(sessionUser);
    }

    // Вспомогательные функции
    function setLang(l) { game.lang = l; updateUI(); }
    function openModal(id) { 
        document.getElementById(id + '-overlay').classList.add('active'); 
        if(id === 'shop') renderShop();
        if(id === 'pets-menu') renderPets();
        if(id === 'wardrobe') renderWardrobe();
        if(id === 'daily') renderDaily();
    }
    function closeModal(id) { document.getElementById(id + '-overlay').classList.remove('active'); }
    function setTab(t) { currentTab = t; renderShop(); }
    function showToast(txt) {
        const t = document.getElementById('game-toast');
        t.innerText = txt; t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }
    function applySkin(id) { game.currentEmoji = game.skins[id].e; document.getElementById('karas-node').innerText = game.currentEmoji; closeModal('wardrobe'); saveGame(); }
    function applyPet(id) { game.currentPet = id; if(id) document.getElementById('pet-node').innerText = game.pets[id].e; closeModal('pets-menu'); updateUI(); saveGame(); }
    function hardReset() { if(confirm("СБРОСИТЬ ВСЁ?")) { localStorage.clear(); location.reload(); } }
    
    function renderPets() {
        const list = document.getElementById('pets-list-content'); list.innerHTML = '';
        for(let id in game.pets) {
            if(!game.pets[id].b) continue;
            list.innerHTML += `<div class="item-card" onclick="applyPet('${id}')"><div><b>${game.pets[id].e} ${game.pets[id][game.lang]}</b><br><small>x${game.pets[id].bonus}</small></div><span>${game.currentPet === id ? '✅' : '🔘'}</span></div>`;
        }
    }
    function renderWardrobe() {
        const list = document.getElementById('wardrobe-list'); list.innerHTML = '';
        for(let id in game.skins) {
            if(!game.skins[id].b) continue;
            list.innerHTML += `<div class="item-card" onclick="applySkin('${id}')"><div><b>${game.skins[id].e} ${game.skins[id][game.lang]}</b></div><span>${game.currentEmoji === game.skins[id].e ? '✅' : '🔘'}</span></div>`;
        }
    }
    function renderDaily() {
        const grid = document.getElementById('daily-grid'); grid.innerHTML = '';
        const canClaim = Date.now() - game.lastDaily > 86400000;
        for(let i=0; i<6; i++) grid.innerHTML += `<div style="background:var(--glass); padding:10px; border-radius:10px; text-align:center; border: 1px solid ${game.dailyStep===i?'var(--gold)':'transparent'}">${TRANSLATIONS[game.lang].day} ${i+1}<br>🎁</div>`;
        document.getElementById('daily-claim-btn').disabled = !canClaim;
    }
    function claimDaily() {
        game.coins += 5000 * (game.dailyStep + 1);
        game.lastDaily = Date.now();
        game.dailyStep = (game.dailyStep + 1) % 6;
        showToast("ЗАБРАНО!"); renderDaily(); updateUI(); saveGame();
    }
    function doPrestige() {
        let cost = Math.pow(game.eggs + 1, 4) * 200000;
        if(game.coins >= cost && confirm("ПРЕСТИЖ?")) {
            game.eggs++; game.coins = 0; game.clickP = 1; game.autoP = 0; game.lvl = 1; game.exp = 0;
            for(let k in game.items) { game.items[k].count = 0; game.items[k].cost = DEFAULT_GAME.items[k].cost; }
            saveGame(); location.reload();
        }
    }

    // Авто-майнинг
    setInterval(() => {
        if(game.autoP > 0) {
            let pM = game.currentPet ? game.pets[game.currentPet].bonus : 1;
            let boost = (1 + (game.eggs * 0.7)) * eventMult;
            game.coins += (game.autoP * game.mult * pM * boost) / 5;
            updateUI();
        }
    }, 400);

    // Пузырьки
    for(let i=0; i<15; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        b.style.left = Math.random() * 100 + '%';
        b.style.width = b.style.height = (Math.random() * 10 + 5) + 'px';
        b.style.animationDelay = Math.random() * 10 + 's';
        document.getElementById('ocean').appendChild(b);
    }
    
    window.onload = loadSession;
    setInterval(saveGame, 5000);
</script>
</body>
</html>
